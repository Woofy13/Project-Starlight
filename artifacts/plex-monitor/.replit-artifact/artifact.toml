kind = "web"
previewPath = "/"
title = "Plex Monitoring Service"
version = "1.0.0"
id = "artifacts/plex-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19396

[services.development]
run = "pnpm --filter @workspace/plex-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plex-monitor", "run", "build" ]
publicDir = "artifacts/plex-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19396"
BASE_PATH = "/"
